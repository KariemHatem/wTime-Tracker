<!-- Page Header -->
<app-header-section
  title="Sessions"
  subtitle="Your work session history"
></app-header-section>

<!-- Page Body -->
<div class="page-body">
  <!-- Filters -->
  <div class="wt-card mb-4">
    <div class="row g-3 align-items-end">
      <div class="col-auto">
        <label class="d-block text-muted mb-1">From</label>
        <p-datepicker
          [(ngModel)]="fromDate"
          dateFormat="yy-mm-dd"
          [showIcon]="true"
          (ngModelChange)="load()"
        />
      </div>
      <div class="col-auto">
        <label class="d-block text-muted mb-1">To</label>
        <p-datepicker
          [(ngModel)]="toDate"
          dateFormat="yy-mm-dd"
          [showIcon]="true"
          (ngModelChange)="load()"
        />
      </div>
      <div class="col-auto">
        <p-button icon="pi pi-refresh" severity="secondary" (click)="load()" />
      </div>
      @if(sessions().length){
      <div class="col ms-auto text-end">
        <span>
          {{ sessions().length }} sessions · {{ fmtMins(totalMinutes()) }} total
        </span>
      </div>
      }
    </div>
  </div>

  <!-- Table -->
  <div class="wt-card">
    <app-data-table
      [value]="sessions()"
      [loading]="loading()"
      [paginated]="true"
      [colspan]="5"
      emptyMessage="No sessions found for this period."
    >
      <ng-template #header>
        <tr>
          <th pSortableColumn="startTime">
            Start <p-sortIcon field="startTime" />
          </th>
          <th>End</th>
          <th pSortableColumn="totalMinutes">
            Duration <p-sortIcon field="totalMinutes" />
          </th>
          <th>Date</th>
        </tr>
      </ng-template>
      <ng-template #body let-s>
        <tr>
          <td class="font-mono">{{ s.startTime | date: "MMM d, h:mm a" }}</td>
          <td class="font-mono">
            {{ s.endTime ? (s.endTime | date: "MMM d, h:mm a") : "—" }}
          </td>
          <td>
            <strong>{{ fmtMins(s.totalMinutes) }}</strong>
          </td>
          <td class="font-mono">{{ s.date | date: 'EEEE, MMMM d, y' }}</td>
        </tr>
      </ng-template>
    </app-data-table>
  </div>
</div>

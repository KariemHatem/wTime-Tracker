<!-- Page Header -->
<app-header-section
  [title]="'SETTINGS.TITLE' | translate"
  [subtitle]="'SETTINGS.SUBTITLE' | translate"
>
</app-header-section>

<!-- Page Body -->
<div class="page-body">
  <div class="row g-4">
    <!-- Profile -->
    <div class="col-12 col-lg-6">
      <div class="wt-card">
        <h6 class="fw-semibold">{{ 'SETTINGS.PROFILE' | translate }}</h6>
        <form [formGroup]="profileForm" (ngSubmit)="saveProfile()">
          <div class="field mb-3">
            <label class="text-muted mb-1 d-block"
              >{{ 'SETTINGS.FULL_NAME' | translate }}</label
            >
            <input pInputText formControlName="fullName" class="w-100" />
          </div>
          <div class="field mb-3">
            <label class="text-muted mb-1 d-block">
              {{ 'SETTINGS.EMAIL' | translate }}</label
            >
            <input
              pInputText
              type="email"
              formControlName="email"
              class="w-100"
            />
          </div>
          <div class="field mb-3">
            <label class="text-muted mb-1 d-block"
              >{{ 'SETTINGS.DAILY_TARGET' | translate }}</label
            >
            <p-inputNumber
              formControlName="targetHoursPerDay"
              [min]="1"
              [max]="12"
              [step]="0.5"
              inputStyleClass="w-100"
              mode="decimal"
            />
          </div>
          <div class="field mb-4">
            <label class="text-muted mb-2 d-block"
              >{{ 'SETTINGS.WORKING_DAYS' | translate }}</label
            >
            <div class="d-flex gap-2 flex-wrap">
              <button
                *ngFor="let d of days"
                type="button"
                [class]="
                      'btn btn-sm ' +
                      (isWorkingDay(d.v)
                        ? 'btn-primary'
                        : 'btn-outline-secondary')
                    "
                (click)="toggleDay(d.v)"
              >
                {{ d.label }}
              </button>
            </div>
          </div>
          <p-button
            type="submit"
            [label]="'SETTINGS.SAVE_PROFILE' | translate"
            [loading]="savingProfile()"
            [disabled]="profileForm.invalid"
            [class.notAllowed]="profileForm.invalid"
          />
        </form>
      </div>
    </div>

    <!-- Password -->
    <div class="col-12 col-lg-6">
      <div class="wt-card">
        <h6>{{ 'SETTINGS.CHANGE_PASSWORD' | translate }}</h6>
        <form [formGroup]="passwordForm" (ngSubmit)="savePassword()">
          <div class="field mb-3">
            <label class="text-muted mb-1 d-block"
              >{{ 'SETTINGS.CURRENT_PASSWORD' | translate }}</label
            >
            <p-password
              formControlName="currentPassword"
              [feedback]="false"
              [toggleMask]="true"
              styleClass="w-100"
              inputStyleClass="w-100"
            />
          </div>
          <div class="field mb-3">
            <label class="text-muted mb-1 d-block">
              {{ 'SETTINGS.NEW_PASSWORD' | translate }}</label
            >
            <p-password
              formControlName="newPassword"
              [toggleMask]="true"
              styleClass="w-100"
              inputStyleClass="w-100"
            />
          </div>
          <div class="field mb-4">
            <label class="text-muted mb-1 d-block"
              >{{ 'SETTINGS.CONFIRM_NEW_PASSWORD' | translate }}</label
            >
            <p-password
              formControlName="confirmPassword"
              [feedback]="false"
              [toggleMask]="true"
              styleClass="w-100"
              inputStyleClass="w-100"
            />
          </div>
          @if(passwordError()){
          <div class="err">{{ passwordError() | translate }}</div>
          }
          <p-button
            type="submit"
            label="Update Password"
            severity="secondary"
            [loading]="savingPassword()"
            [disabled]="passwordForm.invalid"
            [class.notAllowed]="passwordForm.invalid"
          />
        </form>
      </div>

      <!-- Info card -->
      <app-user-info></app-user-info>
    </div>
  </div>
</div>

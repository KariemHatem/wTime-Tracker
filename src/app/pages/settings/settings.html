<!-- Page Header -->
<app-header-section
  title="Settings"
  subtitle="Manage your profile and preferences"
></app-header-section>

<!-- Page Body -->
<div class="page-body">
  <div class="row g-4">
    <!-- Profile -->
    <div class="col-12 col-lg-6">
      <div class="wt-card">
        <h6 class="fw-semibold">Profile</h6>
        <form [formGroup]="profileForm" (ngSubmit)="saveProfile()">
          <div class="field mb-3">
            <label class="text-muted mb-1 d-block">Full Name</label>
            <input pInputText formControlName="fullName" class="w-100" />
          </div>
          <div class="field mb-3">
            <label class="text-muted mb-1 d-block">Email</label>
            <input
              pInputText
              type="email"
              formControlName="email"
              class="w-100"
            />
          </div>
          <div class="field mb-3">
            <label class="text-muted mb-1 d-block">Daily Target (hours)</label>
            <p-inputNumber
              formControlName="targetHoursPerDay"
              [min]="1"
              [max]="12"
              [step]="0.5"
              inputStyleClass="w-100"
              mode="decimal"
            />
          </div>
          <div class="field mb-4">
            <label class="text-muted mb-2 d-block">Working Days</label>
            <div class="d-flex gap-2 flex-wrap">
              <button
                *ngFor="let d of days"
                type="button"
                [class]="
                      'btn btn-sm ' +
                      (isWorkingDay(d.v)
                        ? 'btn-primary'
                        : 'btn-outline-secondary')
                    "
                (click)="toggleDay(d.v)"
              >
                {{ d.label }}
              </button>
            </div>
          </div>
          <p-button
            type="submit"
            label="Save Profile"
            [loading]="savingProfile()"
          />
        </form>
      </div>
    </div>

    <!-- Password -->
    <div class="col-12 col-lg-6">
      <div class="wt-card">
        <h6>Change Password</h6>
        <form [formGroup]="passwordForm" (ngSubmit)="savePassword()">
          <div class="field mb-3">
            <label class="text-muted mb-1 d-block">Current Password</label>
            <p-password
              formControlName="currentPassword"
              [feedback]="false"
              [toggleMask]="true"
              styleClass="w-100"
              inputStyleClass="w-100"
            />
          </div>
          <div class="field mb-3">
            <label class="text-muted mb-1 d-block">New Password</label>
            <p-password
              formControlName="newPassword"
              [toggleMask]="true"
              styleClass="w-100"
              inputStyleClass="w-100"
            />
          </div>
          <div class="field mb-4">
            <label class="text-muted mb-1 d-block">Confirm New Password</label>
            <p-password
              formControlName="confirmPassword"
              [feedback]="false"
              [toggleMask]="true"
              styleClass="w-100"
              inputStyleClass="w-100"
            />
          </div>
          @if(passwordError()){
          <div  class="err">{{ passwordError() }}</div>
          }
          <p-button
            type="submit"
            label="Update Password"
            severity="secondary"
            [loading]="savingPassword()"
          />
        </form>
      </div>

      <!-- Info card -->
      <app-user-info></app-user-info>
    </div>
  </div>
</div>

<div
  class="d-flex align-items-center gap-3 mb-4 flex-wrap"
  style="padding-top: 16px"
>
  <div>
    <label class="d-block text-muted mb-1" style="font-size: 12px">Date</label>
    <p-datepicker
      [(ngModel)]="dailyDate"
      dateFormat="yy-mm-dd"
      [showIcon]="true"
      (ngModelChange)="loadDaily()"
    />
  </div>
  <p-button
    icon="pi pi-download"
    label="Export CSV"
    severity="secondary"
    size="small"
    (click)="exportDaily()"
    [disabled]="!dailyRows().length"
  />
</div>

<!-- SUMMARY -->
<div class="mt-4">
  <app-summary-cards [cards]="monthlySummary()"></app-summary-cards>
</div>
<!-- CHART -->
@if(monthlyChartData){
<div class="wt-card">
  <h6 class="fw-semibold mb-3">
    {{ 'MONTHLY_REPORT.HOURS_BY_WEEK' | translate }}
  </h6>
  <p-chart
    type="bar"
    [data]="monthlyChartData"
    [options]="chartOpts"
    height="220"
  />
</div>
}

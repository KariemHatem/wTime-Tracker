<div class="d-flex align-items-center gap-3 mb-4 pt-3">
  <div>
    <label class="d-block text-muted mb-1">Week starting</label>
    <p-datepicker
      [(ngModel)]="weekDate"
      dateFormat="yy-mm-dd"
      [showIcon]="true"
      (ngModelChange)="loadWeekly()"
    />
  </div>
</div>
<!-- WEEKLY -->
@if(weekly){
<div class="row g-3 mb-4">
  @for(summary of weeklySummary; track summary.label){
  <div class="col-6 col-md-3">
    <div class="wt-card text-center">
      <div class="fw-bold sum-color" [style.color]="summary.color">
        {{ summary.val }}
      </div>
      <div class="text-muted sum-label mt-1">{{ summary.label }}</div>
    </div>
  </div>
  }
</div>
<!-- CHART -->
} @if(weeklyChartData){
<div class="wt-card">
  <h6 class="fw-semibold mb-3">Hours per Day</h6>
  <p-chart
    type="bar"
    [data]="weeklyChartData"
    [options]="chartOpts"
    height="220"
  />
</div>
}

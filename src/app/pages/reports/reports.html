<!-- Page Header -->
<app-header-section
  title="Reports"
  subtitle="Track your productivity over time"
></app-header-section>

<!-- Page Body -->
<div class="page-body">
  <p-tabs [value]="0">
    <p-tablist>
      <p-tab [value]="0">Daily</p-tab>
      <p-tab [value]="1">Weekly</p-tab>
      <p-tab [value]="2">Monthly</p-tab>
    </p-tablist>
    <p-tabpanels>
      <!-- DAILY -->
      <p-tabpanel [value]="0">
        <app-daily-report></app-daily-report>
        <!-- TABLE -->
      </p-tabpanel>

      <!-- WEEKLY -->
      <p-tabpanel [value]="1">
        <app-weekly-report></app-weekly-report>
      </p-tabpanel>

      <!-- MONTHLY -->
      <p-tabpanel [value]="2">
        <app-monthly-report></app-monthly-report>
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>
</div>

<!-- Page Header -->
<app-header-section
  title="Admin Overview"
  subtitle="Real-time workspace monitoring"
></app-header-section>
<!-- Page Body -->
<div class="page-body">
  <!-- Stats -->
  <div class="row g-3 mb-4">
    @for(s of statCards(); track s.label){
    <div class="col-6 col-lg-3">
      <div class="wt-stat-card">
        <div class="stat-icon" [style.color]="s.color">
          <i [class]="'pi ' + s.icon"></i>
        </div>
        <div class="stat-value">{{ s.value }}</div>
        <div class="stat-label">{{ s.label }}</div>
      </div>
    </div>
    }

    <app-user-monitoring></app-user-monitoring>

    <!-- Hours summary -->
    @if(stats()){
    <div class="row g-3">
      <div class="col-12 col-md-6">
        <div class="wt-card">
          <div
            style="
              font-size: 12px;
              color: var(--text-color-secondary);
              margin-bottom: 8px;
              text-transform: uppercase;
              letter-spacing: 0.06em;
            "
          >
            This Week
          </div>
          <div style="font-size: 32px; font-weight: 700; color: #3b82f6">
            {{ stats()?.totalHoursThisWeek?.toFixed(1) }}<span
              style="font-size: 16px"
              >h</span
            >
          </div>
          <div
            style="
              font-size: 12px;
              color: var(--text-color-secondary);
              margin-top: 4px;
            "
          >
            Total team hours
          </div>
        </div>
      </div>
      <div class="col-12 col-md-6">
        <div class="wt-card">
          <div
            style="
              font-size: 12px;
              color: var(--text-color-secondary);
              margin-bottom: 8px;
              text-transform: uppercase;
              letter-spacing: 0.06em;
            "
          >
            This Month
          </div>
          <div style="font-size: 32px; font-weight: 700; color: #22c55e">
            {{ stats()?.totalHoursThisMonth?.toFixed(1) }}<span
              style="font-size: 16px"
              >h</span
            >
          </div>
          <div
            style="
              font-size: 12px;
              color: var(--text-color-secondary);
              margin-top: 4px;
            "
          >
            Total team hours
          </div>
        </div>
      </div>
    </div>
    }
  </div>
</div>

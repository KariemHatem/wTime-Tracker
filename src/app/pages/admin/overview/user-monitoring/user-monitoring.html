<!-- Live monitoring -->
<div class="wt-card mb-4">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h6 class="fw-semibold m-0">Live User Status</h6>
    <div class="d-flex align-items-center gap-2 content">
      <span class="pulse"></span>
      Live
    </div>
  </div>
  <!-- Table -->
  <app-data-table
    [value]="monitoring"
    [loading]="loading()"
    [paginated]="true"
    [colspan]="5"
    emptyMessage="No users found."
  >
    <ng-template #header>
      <tr>
        <th>Employee</th>
        <!-- <th>Status</th> -->
        <th>Last Login</th>
        <th>Hours Today</th>
        <th>This Week</th>
      </tr>
    </ng-template>
    <ng-template #body let-u>
      <tr>
        <td>
          <div class="fw-medium">{{ u.fullName }}</div>
          <div class="content">{{ u.email }}</div>
        </td>
        <!-- <td>
          <span [class]="statusBadge(u.status)">
            {{ u.status || 'idle' }}
          </span>
        </td> -->
        <td class="login-content">
          {{ u.lastLogin ? (u.lastLogin | date:'MMM d, HH:mm') : '—' }}
        </td>
        <td><strong>{{ u.hoursToday?.toFixed(1) }}h</strong></td>
        <td class="hours-content">{{ u.hoursThisWeek?.toFixed(1) }}h</td>
      </tr>
    </ng-template>
  </app-data-table>
</div>

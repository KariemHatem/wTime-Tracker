<!-- Page Header -->
<app-header-section
  [title]="'ANALYTICS.TITLE' | translate"
  [subtitle]="'ANALYTICS.SUBTITLE' | translate"
></app-header-section>

<!-- Page Body -->
<div class="page-body">
  <p-tabs [value]="0">
    <p-tablist>
      <p-tab [value]="0">{{ 'ANALYTICS.TABS.WEEKLY' | translate }}</p-tab>
      <p-tab [value]="1">{{ 'ANALYTICS.TABS.MONTHLY' | translate }}</p-tab>
    </p-tablist>
    <p-tabpanels>
      <!-- WEEKLY -->
      <p-tabpanel [value]="0">
        <app-weekly-analytics></app-weekly-analytics>
      </p-tabpanel>

      <!-- MONTHLY -->
      <p-tabpanel [value]="1">
        <app-monthly-analytics></app-monthly-analytics>
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>
</div>

<div class="page-header d-flex align-items-start justify-content-between">
  <div>
    <h1 class="wt-section-title">Users</h1>
    <p class="wt-section-sub">Manage your team members</p>
  </div>
  <p-button label="Add User" icon="pi pi-plus" (click)="openCreate()" />
</div>

<div class="page-body">
  <div class="wt-card">
    <p-table [value]="users()" [loading]="loading()" responsiveLayout="scroll">
      <ng-template pTemplate="header">
        <tr>
          <th>User</th>
          <th>Role</th>
          <th>Target</th>
          <th>Working Days</th>
          <th>Create Date</th>
          <th>Actions</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-u>
        <tr>
          <td>
            <div style="font-weight: 500">{{ u.fullName }}</div>
            <div style="font-size: 12px; color: var(--text-color-secondary)">
              {{ u.email }}
            </div>
          </td>
          <td>
            <!-- Badges -->
            <app-badge
              [background]="u.isAdmin ? 'rgba(59,130,246,.15)' : 'rgba(148,163,184,.1)'"
              [color]="u.isAdmin ? '#60a5fa' : '#94a3b8'"
              [label]="u.isAdmin ? 'Admin' : 'Employee'"
            ></app-badge>
          </td>

          <td>{{ u.targetHoursPerDay }}h/day</td>
          <td style="font-size: 12px; color: var(--text-color-secondary)">
            {{ dayLabels(u.workingDays) }}
          </td>
          <td>{{ u.createdAt | date:'MMM d, y, h:mm:ss a' }}</td>
          <td>
            <p-button
              icon="pi pi-pencil"
              severity="secondary"
              [text]="true"
              size="small"
              (click)="openEdit(u)"
            />
            <p-button
              icon="pi pi-trash"
              severity="danger"
              [text]="true"
              size="small"
              (click)="confirmDelete(u)"
            />
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td
            colspan="5"
            style="
              text-align: center;
              padding: 40px;
              color: var(--text-color-secondary);
            "
          >
            No users found.
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<!-- User dialog -->
<p-dialog
  [(visible)]="showDialog"
  [modal]="true"
  [header]="editId() ? 'Edit User' : 'Add User'"
  [style]="{ width: '460px' }"
  [draggable]="false"
>
  <form [formGroup]="form" (ngSubmit)="save()">
    <div class="field mb-3">
      <label class="text-muted d-block mb-1" style="font-size: 12px"
        >Full Name</label
      >
      <input pInputText formControlName="fullName" class="w-100" />
    </div>
    <div class="field mb-3">
      <label class="text-muted d-block mb-1" style="font-size: 12px"
        >Email</label
      >
      <input pInputText type="email" formControlName="email" class="w-100" />
    </div>
    <div *ngIf="!editId()" class="field mb-3">
      <label class="text-muted d-block mb-1" style="font-size: 12px"
        >Password</label
      >
      <p-password
        formControlName="password"
        [feedback]="false"
        [toggleMask]="true"
        styleClass="w-100"
        inputStyleClass="w-100"
      />
    </div>
    <div class="row g-3 mb-3">
      <div class="col">
        <label class="text-muted d-block mb-1" style="font-size: 12px"
          >Daily Target (h)</label
        >
        <p-inputNumber
          formControlName="targetHoursPerDay"
          [min]="1"
          [max]="12"
          [step]="0.5"
          inputStyleClass="w-100"
        />
      </div>
      <div class="col d-flex align-items-end">
        <label
          class="d-flex align-items-center gap-2"
          style="cursor: pointer; font-size: 13px"
        >
          <p-checkbox formControlName="isAdmin" [binary]="true" />
          Admin access
        </label>
      </div>
    </div>
    <div class="field mb-3">
      <label class="text-muted d-block mb-2" style="font-size: 12px"
        >Working Days</label
      >
      <div class="d-flex gap-2 flex-wrap">
        <button
          *ngFor="let d of days"
          type="button"
          [class]="
                'btn btn-sm ' +
                (isWD(d.v) ? 'btn-primary' : 'btn-outline-secondary')
              "
          style="font-size: 12px; padding: 4px 10px; border-radius: 6px"
          (click)="toggleWD(d.v)"
        >
          {{ d.label }}
        </button>
      </div>
    </div>
  </form>
  <ng-template pTemplate="footer">
    <p-button
      label="Cancel"
      severity="secondary"
      [text]="true"
      (click)="closeDialog()"
    />
    <p-button
      [label]="editId() ? 'Save Changes' : 'Create User'"
      (click)="save()"
      [loading]="saving()"
    />
  </ng-template>
</p-dialog>

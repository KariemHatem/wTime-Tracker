<div class="wt-shell">
  <!-- Sidebar -->
  <aside class="wt-sidebar">
    <div class="wt-sidebar__logo">
      <i class="pi pi-clock"></i>
      <span>WorkTracker</span>
    </div>

    <nav class="wt-sidebar__nav">
      <a
        class="wt-sidebar__link"
        routerLink="/dashboard"
        routerLinkActive="active"
      >
        <i class="pi pi-home"></i> <span>Dashboard</span>
      </a>
      <a
        class="wt-sidebar__link"
        routerLink="/sessions"
        routerLinkActive="active"
      >
        <i class="pi pi-list"></i> <span>Sessions</span>
      </a>
      <a
        class="wt-sidebar__link"
        routerLink="/reports"
        routerLinkActive="active"
      >
        <i class="pi pi-chart-bar"></i> <span>Reports</span>
      </a>
      <a
        class="wt-sidebar__link"
        routerLink="/settings"
        routerLinkActive="active"
      >
        <i class="pi pi-cog pi-spin"></i> <span>Settings</span>
      </a>
      <!-- Admin -->
      @if(userSignal()?.isAdmin){
      <ng-container>
        <div class="wt-sidebar__section-label admin">
          <span class="admin">Admin</span>
        </div>
        <a
          class="wt-sidebar__link"
          routerLink="/admin/overview"
          routerLinkActive="active"
        >
          <i class="pi pi-th-large"></i> <span>Overview</span>
        </a>
        <a
          class="wt-sidebar__link"
          routerLink="/admin/users"
          routerLinkActive="active"
        >
          <i class="pi pi-users"></i> <span>Users</span>
        </a>
        <a
          class="wt-sidebar__link"
          routerLink="/admin/reports"
          routerLinkActive="active"
        >
          <i class="pi pi-file"></i> <span>Reports</span>
        </a>
        <a
          class="wt-sidebar__link"
          routerLink="/admin/activity"
          routerLinkActive="active"
        >
          <i class="pi pi-bolt"></i> <span>Activity</span>
        </a>
        <a
          class="wt-sidebar__link"
          routerLink="/admin/analytics"
          routerLinkActive="active"
        >
          <i class="pi pi-chart-line"></i> <span>Analytics</span>
        </a>
      </ng-container>
      }
    </nav>

    <div class="preferences">
      <div class="wt-sidebar__section-label">
        <span class="preferences-label">Preferences</span>
      </div>
      <!-- Theme -->
      <div class="theme-btn mb-3">
        <button (click)="themeOption.toggel()">
          <i
            class="pi"
            [class.pi-moon]="themeOption.theme() === 'dark'"
            [class.pi-sun]="themeOption.theme() === 'light'"
          ></i>
          <span class="text-muted">
            {{themeOption.theme() === 'dark' ? 'Dark ' : 'Light '}} mode
          </span>
        </button>
      </div>
    </div>

    <div class="wt-sidebar__footer">
      <!-- User info -->
      @if(userSignal()){
      <div class="user-info">
        <div class="avatar">{{ initials }}</div>
        <div>
          <div class="user-name">{{ userSignal()?.fullName }}</div>
          <div class="user-email" title="{{ userSignal()?.email }}">
            {{ userSignal()?.email }}
          </div>
        </div>
      </div>
      }

      <!-- Logout -->
      <div class="logout">
        <button class="logout-btn" (click)="logout()">
          <i class="pi pi-sign-out"></i> <span>Sign out</span>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="wt-content">
    <router-outlet />
  </main>
</div>

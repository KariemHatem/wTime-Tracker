<p-table [value]="value()" [loading]="loading()">
  <ng-template pTemplate="header">
    <ng-content *ngTemplateOutlet="headerTpl()"></ng-content>
  </ng-template>
  <ng-template pTemplate="body" let-row>
    <ng-content
      *ngTemplateOutlet="bodyTpl(); context: { $implicit: row }"
    ></ng-content>
  </ng-template>
  <!-- Empty message -->
  <ng-template pTemplate="emptymessage">
    <tr>
      <td [attr.colspan]="colspan()" class="empty-message text-center p-4">
        {{ emptyMessage() || "No data found." }}
      </td>
    </tr>
  </ng-template>
</p-table>
